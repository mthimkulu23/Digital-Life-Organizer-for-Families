{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center pt-5">
    <div class="glass-card shadow-lg auth-card w-100 p-5 mt-4 border-danger border-top border-4 position-relative overflow-hidden">
        <!-- Background Accents -->
        <div class="position-absolute bg-danger rounded-circle blur-3xl opacity-10" style="width: 200px; height: 200px; top: -50px; right: -50px; z-index: 0; filter: blur(40px);"></div>
        
        <div class="text-center mb-4 position-relative z-1">
            <div class="mx-auto bg-danger-soft text-danger d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 70px; height: 70px;">
                <i class="fa-solid fa-truck-medical fs-1 pulse-icon"></i>
            </div>
            <h2 class="fw-bold text-dark">Emergency Access</h2>
            <p class="text-muted small">Enter the 12-character emergency code provided by the vault owner to unlock their digital life.</p>
        </div>
        
        <form action="{{ url_for('emergency_access') }}" method="POST" class="position-relative z-1">
            <div class="mb-4">
                <label for="emergency_code" class="form-label small text-muted text-uppercase fw-bold"><i class="fa-solid fa-key me-1"></i> Emergency Code</label>
                <input type="text" class="form-control form-control-lg text-center" id="emergency_code" name="emergency_code" placeholder="XXXX-XXXX-XXXX" required style="font-family: monospace; letter-spacing: 2px; font-weight: bold; font-size: 1.5rem;" autocomplete="off" maxlength="14">
                <div class="form-text mt-2"><i class="fa-solid fa-lock text-success me-1"></i> Access is strictly logged and owner is notified.</div>
            </div>
            
            <button type="submit" class="btn btn-danger w-100 py-3 rounded-pill fw-bold shadow-lg fs-5 d-flex align-items-center justify-content-center"><i class="fa-solid fa-unlock-keyhole me-2"></i> Request Vault Unlock</button>
        </form>
        
        <div class="text-center mt-4 pt-3 border-top position-relative z-1">
            <p class="small text-muted mb-0"><i class="fa-solid fa-shield-halved text-primary me-1"></i> Secure LifeVault Protocol Active</p>
        </div>
    </div>
</div>

<script>
    // Simple script to format the emergency code input (auto append hyphens)
    document.getElementById('emergency_code').addEventListener('input', function (e) {
        let value = e.target.value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
        let formatted = '';
        if (value.length > 0) {
            formatted += value.substring(0, 4);
        }
        if (value.length > 4) {
            formatted += '-' + value.substring(4, 8);
        }
        if (value.length > 8) {
            formatted += '-' + value.substring(8, 12);
        }
        e.target.value = formatted;
    });
</script>
{% endblock %}
