{% extends 'base.html' %}

{% block public_content %}
<div class="auth-wrapper py-5">
    <div class="auth-panel text-center border-danger mx-auto mt-4" style="border-top-width: 4px; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
        <div class="mb-4">
            <div class="mx-auto rounded-circle bg-danger bg-opacity-10 text-danger d-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                <i class="fa-solid fa-truck-medical fs-2"></i>
            </div>
            <h2 class="mb-2 text-dark">Emergency Access</h2>
            <p class="text-muted small">Enter the 12-character emergency code provided by the vault owner to unlock their digital life.</p>
        </div>
        
        <form action="{{ url_for('emergency_access') }}" method="POST" class="text-start">
            <div class="mb-4">
                <label class="form-label text-muted fw-bold">Emergency Code</label>
                <input type="text" class="form-control text-center fs-5 py-3" id="emergency_code" name="emergency_code" placeholder="XXXX-XXXX-XXXX" required style="font-family: monospace; letter-spacing: 2px; font-weight: bold;" autocomplete="off" maxlength="14">
                <div class="form-text mt-2 small text-center"><i class="fa-solid fa-shield-halved text-success"></i> Secure connection. Access is strictly logged.</div>
            </div>
            
            <button type="submit" class="btn btn-danger w-100 py-3 fw-bold fs-5 text-white shadow-sm">Unlock Vault</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('emergency_code').addEventListener('input', function (e) {
        let value = e.target.value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
        let formatted = '';
        if (value.length > 0) {
            formatted += value.substring(0, 4);
        }
        if (value.length > 4) {
            formatted += '-' + value.substring(4, 8);
        }
        if (value.length > 8) {
            formatted += '-' + value.substring(8, 12);
        }
        e.target.value = formatted;
    });
</script>
{% endblock %}
