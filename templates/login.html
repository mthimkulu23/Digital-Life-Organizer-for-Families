{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center pt-5">
    <div class="glass-card shadow-lg auth-card w-100 p-5 mt-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold"><i class="fa-solid fa-lock text-primary me-2"></i> Access Vault</h2>
            <p class="text-muted small">Login to manage your stored documents.</p>
        </div>
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="mb-3">
                <label for="email" class="form-label small text-muted text-uppercase fw-bold"><i class="fa-solid fa-envelope me-1"></i> Email address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label small text-muted text-uppercase fw-bold"><i class="fa-solid fa-key me-1"></i> Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-medium rounded-pill fs-5"><i class="fa-solid fa-arrow-right-to-bracket me-2"></i> Login to Vault</button>
        </form>
        
        <div class="text-center mt-4 border-top pt-3">
            <p class="text-muted small mb-0">Don't have a vault yet? <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold text-primary">Create one securely</a></p>
        </div>
    </div>
</div>
{% endblock %}
