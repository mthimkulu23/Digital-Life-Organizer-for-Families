{% extends 'base.html' %}

{% block public_content %}
<div class="auth-wrapper">
    <div class="auth-panel text-center">
        <h2 class="mb-2 text-dark">Welcome back</h2>
        <p class="text-muted small mb-4">Log in to your Digital Life Organizer to manage your vault.</p>
        
        <form action="{{ url_for('login') }}" method="POST" class="text-start">
            <div class="mb-3">
                <label class="form-label text-muted">Email address</label>
                <input type="email" class="form-control" name="email" placeholder="john@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted">Password</label>
                <input type="password" class="form-control" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-medium fs-5 text-white">Log In</button>
        </form>
        
        <div class="mt-4 pt-3 border-top">
            <p class="text-muted small mb-3">Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold" style="color: var(--primary-blue);">Sign up for free</a></p>
            
            <!-- Premium CTA -->
            <div class="rounded-3 p-3 text-center mt-2" style="background: linear-gradient(135deg, #1e3a8a10, #0ea5e920); border: 1px solid #1e3a8a30;">
                <p class="fw-bold small mb-1 text-dark"><i class="fa-solid fa-crown text-warning me-1"></i> Protect your whole family</p>
                <p class="text-muted" style="font-size: 0.75rem;">Unlimited contacts, documents, devices & more.</p>
                <a href="{{ url_for('register', plan='premium') }}" class="btn btn-sm fw-semibold px-4 rounded-pill text-white w-100" style="background: linear-gradient(135deg, #1e3a8a, #0ea5e9);">
                    Get the Family Plan — R200.00/year
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
