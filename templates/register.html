{% extends 'base.html' %}

{% block public_content %}
<div class="auth-wrapper">
    <div class="auth-panel text-center">
        <h2 class="mb-2 text-dark">Create an Account</h2>
        <p class="text-muted small mb-4">You are one step away from securing your digital life.</p>
        
        <form action="{{ url_for('register') }}" method="POST" class="text-start">
            <div class="mb-3">
                <label class="form-label text-muted">Full Name</label>
                <input type="text" class="form-control" name="name" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted">Email address</label>
                <input type="email" class="form-control" name="email" placeholder="john@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted">Password</label>
                <input type="password" class="form-control" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-medium fs-5 text-white">Create Vault</button>
        </form>
        
        <div class="mt-4 pt-3 border-top">
            <p class="text-muted small mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none fw-bold" style="color: var(--primary-blue);">Log in.</a></p>
        </div>
    </div>
</div>
{% endblock %}
