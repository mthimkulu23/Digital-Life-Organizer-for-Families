{% extends 'base.html' %}

{% block content %}
<div class="container d-flex justify-content-center pt-5">
    <div class="glass-card shadow-lg auth-card w-100 p-5 mt-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold"><i class="fa-solid fa-user-shield text-primary me-2"></i> Create Your Vault</h2>
            <p class="text-muted small">Secure your digital life and protect your family.</p>
        </div>
        
        <form action="{{ url_for('register') }}" method="POST">
            <div class="mb-3">
                <label for="name" class="form-label small text-muted text-uppercase fw-bold"><i class="fa-solid fa-user me-1"></i> Full Name</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label small text-muted text-uppercase fw-bold"><i class="fa-solid fa-envelope me-1"></i> Email address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label small text-muted text-uppercase fw-bold"><i class="fa-solid fa-key me-1"></i> Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-medium rounded-pill fs-5"><i class="fa-solid fa-shield me-2"></i> Register Securely</button>
        </form>
        
        <div class="text-center mt-4 border-top pt-3">
            <p class="text-muted small mb-0">Already have a vault? <a href="{{ url_for('login') }}" class="text-decoration-none fw-bold text-primary">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
